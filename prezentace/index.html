<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Respekt — klíčová zjištění</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
<style>
  /* ---- Respekt design system: fonty ---- */
  @font-face{ font-family:'Adelle Sans'; src:url('fonts/AdelleSans-Regular.otf') format('opentype'); font-weight:400; font-style:normal; font-display:swap; }
  @font-face{ font-family:'Adelle Sans'; src:url('fonts/AdelleSans-Semibold.otf') format('opentype'); font-weight:600; font-style:normal; font-display:swap; }
  @font-face{ font-family:'Adelle Sans'; src:url('fonts/AdelleSans-Bold.otf') format('opentype'); font-weight:700; font-style:normal; font-display:swap; }
  @font-face{ font-family:'Adelle Sans'; src:url('fonts/AdelleSans-Extrabold.otf') format('opentype'); font-weight:800; font-style:normal; font-display:swap; }
  @font-face{ font-family:'Adelle'; src:url('fonts/Adelle-Regular.otf') format('opentype'); font-weight:400; font-style:normal; font-display:swap; }
  @font-face{ font-family:'Adelle'; src:url('fonts/Adelle-Bold.otf') format('opentype'); font-weight:700; font-style:normal; font-display:swap; }

  /* ---- tokeny ---- */
  :root{
    --paper:#FFFFFF; --ink:#181D27; --graphite:#494E56; --gray:#868D98;
    --hairline:#E0E4E9; --surface:#ECEFF2; --red:#CE0B24; --red-press:#A8081C;
    --amber:#F2A43A; --wash-amber:#FBEFD6; --rule:#CFD4DA; --radius:6px;
    --font-sans:'Adelle Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --font-serif:'Adelle',Georgia,'Times New Roman',serif;
  }
  html,body,.reveal-viewport{ background:var(--surface); }
  .reveal{ font-family:var(--font-sans); font-size:30px; color:var(--ink); background:var(--surface); }
  .reveal .slides{ text-align:left; }

  /* nadpis zjištění (Adelle Sans, headline) — s podtržením */
  .reveal h2{ font-family:var(--font-sans); font-size:30px; font-weight:800; color:var(--ink);
              text-transform:none; margin:0 0 16px; padding-bottom:12px; line-height:1.1;
              letter-spacing:-0.015em; border-bottom:1.5px solid var(--rule); }
  .reveal ul{ display:block; margin:0 0 14px; }
  .reveal li{ font-size:20px; line-height:1.4; margin:0 0 7px; color:var(--graphite); }
  .reveal li::marker{ color:var(--red); }
  .reveal strong{ color:var(--ink); font-weight:700; }

  /* grafy — bílá karta s vnitřním paddingem nad #ECEFF2 */
  .reveal section img{ display:block; box-sizing:border-box; margin:8px auto 16px;
                       max-height:330px; max-width:88%; padding:16px; background:#fff;
                       border-radius:10px; border:1px solid var(--hairline);
                       box-shadow:0 8px 26px rgba(24,29,39,.09); }

  /* „Co s tím" callout — amber wash + serif text (reading) */
  .reveal blockquote{ width:100%; box-sizing:border-box; margin:0; padding:13px 18px;
                      background:var(--wash-amber); border-radius:var(--radius); box-shadow:none; border:none;
                      font-family:var(--font-serif); font-size:18px; font-style:normal;
                      color:var(--ink); line-height:1.45; }
  .reveal blockquote::before{ content:"CO S TÍM"; display:block; font-family:var(--font-sans);
                              color:var(--red); font-weight:700; font-size:12px; letter-spacing:.06em;
                              text-transform:uppercase; margin-bottom:4px; }

  /* velké číslo (zjištění bez grafu) */
  .reveal .stat{ font-family:var(--font-sans); font-size:86px; font-weight:800; color:var(--red);
                 text-align:center; margin:8px 0 18px; line-height:1; letter-spacing:-0.02em; }

  /* tmavé snímky: titul / předěl / závěr */
  .reveal .dark{ color:#fff; }
  .reveal .dark .kicker{ color:rgba(255,255,255,.60); font-weight:700; letter-spacing:.07em;
                         font-size:16px; text-transform:uppercase; margin:0 0 16px; }
  .reveal .dark h1{ font-family:var(--font-sans); color:#fff; font-weight:800; font-size:56px;
                    line-height:1.06; letter-spacing:-0.02em; margin:0; text-transform:none; }
  .reveal .title .lead{ font-family:var(--font-serif); color:rgba(255,255,255,.82); font-size:23px; margin:24px 0 0; }
  .reveal .title .meta{ color:rgba(255,255,255,.50); font-size:15px; margin:30px 0 0; letter-spacing:.01em; }
  .reveal .divider h1{ font-size:62px; }
  .reveal .closing ol{ margin:34px 0 0; padding:0; counter-reset:p; list-style:none; }
  .reveal .closing li{ color:rgba(255,255,255,.80); font-size:20px; line-height:1.42; margin:0 0 20px;
                       padding-left:54px; position:relative; }
  .reveal .closing li::before{ counter-increment:p; content:counter(p); position:absolute; left:0; top:-6px;
                               color:var(--red); font-weight:800; font-size:36px; font-family:var(--font-sans); }
  .reveal .closing strong{ color:#fff; }

  /* Respekt wordmark (přebarvený přes mask) */
  .reveal .wordmark{ width:188px; height:58px; margin:0 0 26px;
                     background:#fff; -webkit-mask:url('assets/respekt-wordmark.svg') no-repeat left center;
                     mask:url('assets/respekt-wordmark.svg') no-repeat left center;
                     -webkit-mask-size:contain; mask-size:contain; }
  .reveal .closing .wordmark{ width:150px; height:46px; margin-bottom:18px; opacity:.92; }

  /* progress bar nahoře, tlustší, v barvě Respektu */
  .reveal .progress{ position:fixed; top:0; bottom:auto; height:6px; color:var(--red); background:rgba(24,29,39,.08); }
  .reveal .progress span{ height:6px; }
  /* šipky vpravo dole, číslo strany uprostřed šipek; R monogram vlevo dole */
  .reveal .controls{ color:var(--red); }
  /* číslo strany — pozici (nalevo od levé šipky, vert. střed) řídí JS layoutChrome() */
  .reveal .slide-number{ background:transparent; color:var(--gray); font-family:var(--font-sans);
                         left:auto; top:auto; font-size:13px; pointer-events:none; z-index:35;
                         font-variant-numeric:tabular-nums; }
  /* R monogram — černé, výška = šipky; levý okraj řídí JS (zarovnání s obsahem slidu);
     na tmavých slidech se skrývá (.corner-r.hide) */
  .reveal .corner-r{ position:fixed; bottom:22px; width:17px; height:36px; z-index:35;
                     background:var(--ink); pointer-events:none;
                     -webkit-mask:url('assets/respekt-r.svg') no-repeat center/contain;
                     mask:url('assets/respekt-r.svg') no-repeat center/contain; }
  .reveal .corner-r.hide{ display:none; }
  /* poslední slide (Shrnutí): štítek callotu = „Priority" místo „Co s tím" */
  .reveal section.summary blockquote::before{ content:"Priority"; }

  /* ---- Dvousloupcové slajdy (h2 přes celou šířku, vlevo graf, vpravo text, dole callout) ---- */
  .reveal section.two-col {
    display: grid !important;
    grid-template-areas:
      "hdr hdr"
      "vis txt"
      "cta cta";
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 52% 44%;
    column-gap: 28px;
    row-gap: 18px;
    align-content: start;
  }
  .reveal section.two-col > h2 { grid-area: hdr; }
  .reveal section.two-col > ul  { grid-area: txt; align-self: start; margin-bottom: 0; }
  .reveal section.two-col > blockquote { grid-area: cta; margin-top: 4px; }
  .reveal section.two-col > p:has(img) { grid-area: vis; align-self: center; margin: 0; }
  .reveal section.two-col > p:has(img) > img {
    max-width: 100% !important;
    max-height: 460px !important;
    margin: 0 auto;
  }
  /* lehce zmenšený font pro dvousloupcové slajdy */
  .reveal section.two-col li { font-size: 18px; margin-bottom: 11px; }
  .reveal section.two-col blockquote { font-size: 16px; }

  /* logo na přihlašovací obrazovce (tmavý wordmark na světlém pozadí) */
  #rpk-gate .login-logo{ width:150px; height:46px; margin:0 auto 1.1em;
                         background:var(--ink);
                         -webkit-mask:url('assets/respekt-wordmark.svg') no-repeat center/contain;
                         mask:url('assets/respekt-wordmark.svg') no-repeat center/contain; }

  /* ---- Mobil (Reveal width=390) ---- */
  @media (max-width: 700px) {
    /* R monogram skrýt */
    .reveal .corner-r { display: none !important; }
    /* Větší fonty pro 390px slide koordináty */
    .reveal h2 { font-size: 22px; margin-bottom: 10px; padding-bottom: 8px; }
    .reveal li { font-size: 15px; margin-bottom: 6px; }
    .reveal blockquote { font-size: 13px; padding: 10px 14px; }
    .reveal .stat { font-size: 64px; }
    /* Dvousloupcové → jeden sloupec: h2 → graf → text → callout */
    .reveal section.two-col {
      grid-template-areas: "hdr" "vis" "txt" "cta";
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto auto;
      row-gap: 10px;
    }
    .reveal section.two-col li { font-size: 14px; margin-bottom: 5px; }
    .reveal section.two-col blockquote { font-size: 12px; }
    /* Grafy na plnou šířku */
    .reveal section img {
      max-width: 100% !important; max-height: 260px !important;
      margin: 8px auto; padding: 10px;
    }
    .reveal section.two-col > p:has(img) > img {
      max-width: 100% !important; max-height: 240px !important;
    }
  }
</style>
</head>
<body>
<div id="rpk-gate" style="position:fixed;inset:0;background:#faf9f7;z-index:99999;display:flex;align-items:center;justify-content:center;font-family:sans-serif">
  <form onsubmit="rpkCheck(event)" style="text-align:center;max-width:320px;width:90%">
    <div class="login-logo" aria-label="Respekt"></div>
    <div style="color:#666;margin-bottom:1.2em;font-size:.9em">Průzkum předplatitelů — interní materiál</div>
    <input id="rpk-in" type="password" placeholder="Heslo" autofocus style="width:100%;padding:9px 12px;border:1px solid #ccc;border-radius:7px;font-size:1em;box-sizing:border-box;margin-bottom:.6em">
    <button type="submit" style="width:100%;padding:9px;background:#CE0B24;color:#fff;border:none;border-radius:7px;font-size:1em;cursor:pointer;font-weight:600">Vstoupit</button>
    <div id="rpk-err" style="color:#CE0B24;margin-top:.6em;font-size:.85em;min-height:1.2em"></div>
  </form>
</div>
<script>
var RPK_PWD='Lucerna';
function rpkCheck(e){e.preventDefault();if(document.getElementById('rpk-in').value===RPK_PWD){sessionStorage.setItem('rpk',RPK_PWD);document.getElementById('rpk-gate').remove();}else{document.getElementById('rpk-err').textContent='Nesprávné heslo.';document.getElementById('rpk-in').value='';document.getElementById('rpk-in').focus();}}
if(sessionStorage.getItem('rpk')===RPK_PWD){document.getElementById('rpk-gate').remove();}
</script>
<div class="reveal">
  <div class="slides">
    <section data-markdown="slides.md"
             data-separator="\r?\n---\r?\n"
             data-separator-vertical="\r?\n>>>\r?\n"
             data-charset="utf-8">
    </section>
  </div>
  <div class="corner-r" aria-hidden="true"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
<script>
  var _mob = window.innerWidth <= 700;
  Reveal.initialize({
    width: _mob ? 390 : 1120, height: _mob ? 700 : 760,
    margin: _mob ? 0.03 : 0.035, minScale: 0.2, maxScale: _mob ? 1.0 : 1.6,
    hash: true, slideNumber: 'c/t', controls: true, progress: true,
    transition: 'slide', plugins: [ RevealMarkdown ],
  });
  // R monogram skrýt na tmavých slidech (title / předěly)
  function syncCornerR(){
    var s=Reveal.getCurrentSlide(); if(!s) return;
    var bg=(s.getAttribute('data-background-color')||'').replace(/\s/g,'').toLowerCase();
    var dark = bg==='#222222' || s.classList.contains('has-dark-background');
    document.querySelector('.corner-r').classList.toggle('hide', dark);
  }
  // R, šipky a číslo zarovnat k okrajům obsahu (referenece = .slides, stabilní přes všechny slidy)
  // Na mobilu přeskočit — chrome v default pozici, R skryté přes CSS
  function layoutChrome(){
    if(window.innerWidth <= 700) return;
    var vw=window.innerWidth, vh=window.innerHeight;
    var box=document.querySelector('.reveal .slides').getBoundingClientRect();
    var leftInset=Math.max(0,Math.round(box.left));
    var rightInset=Math.max(0,Math.round(vw-box.right));
    document.querySelector('.corner-r').style.left=leftInset+'px';
    var ctr=document.querySelector('.controls');
    ctr.style.right=rightInset+'px';
    var ra=document.querySelector('.controls .navigate-right').getBoundingClientRect();
    ctr.style.right=Math.round(rightInset-(box.right-ra.right))+'px';
    var la=document.querySelector('.controls .navigate-left');
    var sn=document.querySelector('.slide-number');
    if(la && sn){
      var lab=la.getBoundingClientRect();
      sn.style.right=Math.round(vw-lab.left+8)+'px';
      var snr=sn.getBoundingClientRect();
      sn.style.bottom=Math.round(vh-(lab.top+lab.height/2)-snr.height/2)+'px';
    }
  }
  Reveal.on('ready', function(){ layoutChrome(); syncCornerR(); });
  Reveal.on('slidechanged', syncCornerR);   // jen R skrýt/ukázat při změně slidu
  window.addEventListener('resize', layoutChrome);
</script>
</body>
</html>
